<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>StudyCore - Intelligent Study Assistant</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        window.firebaseApp = initializeApp({
            apiKey: "AIzaSyCY4TEfISmEsOGRQCF7ich82ZPnwZw9-Ac",
            authDomain: "nexasync-73a38.firebaseapp.com",
            projectId: "nexasync-73a38",
            storageBucket: "nexasync-73a38.firebasestorage.app",
            messagingSenderId: "284684811015",
            appId: "1:284684811015:web:c250a3faed526fda68e3a2"
        });
        window.auth = getAuth(window.firebaseApp);
        window.db = getFirestore(window.firebaseApp);
    </script>
    <!-- Custom modules -->
    <script type="module" src="firebase.js"></script>
    <script type="module" src="engine.js"></script>
    <script type="module" src="analytics.js"></script>
    <script type="module" src="chat.js"></script>
    <script type="module" src="app.js"></script>
</head>
<body>
    <!-- Authentication Container -->
    <div id="auth-container" class="auth-container">
        <div class="auth-box">
            <h2>StudyCore</h2>
            <input type="email" id="login-email" placeholder="Email" />
            <input type="password" id="login-password" placeholder="Password" />
            <button id="login-btn">Login</button>
            <button id="signup-btn">Sign Up</button>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app-container" style="display: none;">
        <!-- Top Header with Hamburger -->
        <header class="app-header">
            <div class="logo">StudyCore</div>
            <button id="menu-toggle" class="hamburger" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
        </header>

        <div class="app-layout">
            <!-- Sidebar Navigation -->
            <aside id="sidebar" class="sidebar">
                <nav>
                    <button class="nav-btn" data-view="dashboard">📊 Dashboard</button>
                    <button class="nav-btn" data-view="schedule">📅 Schedule</button>
                    <button class="nav-btn" data-view="analytics">📈 Analytics</button>
                    <button class="nav-btn" data-view="chat">💬 Chat</button>
                </nav>
                <button id="logout-btn" class="logout-btn">Logout</button>
            </aside>

            <!-- Main Content -->
            <main class="main-content">
                <!-- Dashboard View -->
                <div id="dashboard-view" class="view active">
                    <h2>Dashboard</h2>
                    <div class="stats-cards">
                        <div class="card">Total Study Time: <span id="total-time">0</span> hrs</div>
                        <div class="card">Tasks Completed: <span id="tasks-completed">0</span></div>
                        <div class="card">Current Streak: <span id="streak">0</span> days</div>
                    </div>
                    <div class="quick-setup">
                        <h3>Setup Your Study Plan</h3>
                        <label>Total Available Time (hours): <input type="number" id="total-time-input" step="0.5" /></label>
                        <label>Start Time: <input type="time" id="start-time" value="09:00" /></label>
                        <div id="tasks-list">
                            <div class="task-input">
                                <input type="text" placeholder="Task Name" class="task-name" />
                                <input type="number" placeholder="Duration (hrs)" step="0.5" class="task-duration" />
                                <select class="task-difficulty">
                                    <option value="easy">Easy</option>
                                    <option value="medium">Medium</option>
                                    <option value="hard">Hard</option>
                                </select>
                                <button class="remove-task">×</button>
                            </div>
                        </div>
                        <button id="add-task-btn">+ Add Task</button>
                        <button id="generate-schedule-btn">Generate Schedule</button>
                    </div>
                </div>

                <!-- Schedule View -->
                <div id="schedule-view" class="view">
                    <h2>Your Study Schedule</h2>
                    <div id="schedule-list"></div>
                    <div id="timer-section">
                        <h3>Active Task Timer</h3>
                        <p id="current-task">No active task</p>
                        <div id="timer-display">00:00:00</div>
                        <button id="start-timer-btn" disabled>Start Timer</button>
                        <button id="complete-task-btn" disabled>Complete Task</button>
                    </div>
                </div>

                <!-- Analytics View -->
                <div id="analytics-view" class="view">
                    <h2>Analytics</h2>
                    <div class="chart-container">
                        <canvas id="subject-chart"></canvas>
                        <canvas id="daily-chart"></canvas>
                    </div>
                    <div id="weekly-summary"></div>
                </div>

                <!-- Chat View -->
                <div id="chat-view" class="view">
                    <h2>Chat Assistant</h2>
                    <div id="chat-messages" class="chat-messages"></div>
                    <div class="chat-input">
                        <input type="text" id="chat-input" placeholder="Type a command..." />
                        <button id="chat-send">Send</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module">
        import { initApp } from './app.js';
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
